name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: knowledge-graph-analysis

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package plugin
        run: |
          mkdir -p release/${{ env.PLUGIN_NAME }}
          cp dist/main.js dist/graph_analysis_wasm_bg.wasm dist/knowledge-domains.json release/${{ env.PLUGIN_NAME }}/
          cp manifest.json README.md LICENSE release/${{ env.PLUGIN_NAME }}/
          cp dist/styles.css release/${{ env.PLUGIN_NAME }}/ 2>/dev/null || touch release/${{ env.PLUGIN_NAME }}/styles.css
          cd release && zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/${{ env.PLUGIN_NAME }}.zip
            release/${{ env.PLUGIN_NAME }}/main.js
            release/${{ env.PLUGIN_NAME }}/manifest.json
            release/${{ env.PLUGIN_NAME }}/styles.css
            release/${{ env.PLUGIN_NAME }}/graph_analysis_wasm_bg.wasm
            release/${{ env.PLUGIN_NAME }}/knowledge-domains.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
